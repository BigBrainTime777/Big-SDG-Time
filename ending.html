<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDGs RPG - 遊戲結束</title>
    <style>
        /* 全局樣式 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Press Start 2P', cursive;
            background-color: #0a0a1a;
            color: #fff;
            overflow: hidden;
            image-rendering: pixelated;
        }
        
        @font-face {
            font-family: 'Press Start 2P';
            src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        }
        
        /* 像素背景動畫 */
        .pixel-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f2d;
            background-image: 
                linear-gradient(transparent 95%, rgba(233, 69, 96, 0.1) 95%),
                linear-gradient(90deg, transparent 95%, rgba(233, 69, 96, 0.1) 95%),
                linear-gradient(#0f0f2d 1px, transparent 1px),
                linear-gradient(90deg, #0f0f2d 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px, 20px 20px, 20px 20px;
            z-index: 0;
        }
        
        /* 結束介面 */
        .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .game-logo {
            font-size: 48px;
            color: #e94560;
            text-shadow: 5px 5px 0 #000;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.3;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .game-message {
            max-width: 600px;
            font-size: 24px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
            color: #f9f9f9;
            text-shadow: 2px 2px 0 #000;
        }
        
        .sdg-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="%23162B58"/><path d="M32 12 L52 32 L32 52 L12 32 Z" fill="%23e94560"/><path d="M32 22 L42 32 L32 42 L22 32 Z" fill="%23f9f9f9"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(3px 3px 0 #000);
            animation: pulse 1.5s ease-in-out infinite alternate;
        }
        
        .button-container {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }
        
        .end-button {
            padding: 15px 30px;
            font-size: 16px;
            background-color: #e94560;
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 4px solid #fff;
            box-shadow: 8px 8px 0 #000;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .end-button:hover {
            background-color: #ff6b81;
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0 #000;
        }
        
        .end-button:active {
            transform: translate(0, 0);
            box-shadow: 5px 5px 0 #000;
        }
        
        .end-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            pointer-events: none;
            transition: all 0.3s;
        }
        
        .end-button:hover::after {
            left: 100%;
        }
        
        /* 像素星星裝飾 */
        .pixel-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #f9f9f9;
            animation: twinkle 2s infinite ease-in-out;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* 慶祝動畫 */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #e94560;
            animation: fall 3s linear forwards;
        }
        
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 像素背景 -->
    <div class="pixel-bg"></div>
    
    <!-- 結束介面 -->
    <div class="end-screen" id="end-screen">
        <div class="sdg-icon"></div>
        <div class="game-logo">SDGs RPG<br>和平、正義及健全制度</div>
        <div class="game-message">
            恭喜您！<br>遊戲到此結束
        </div>
        <div class="button-container">
            <button class="end-button" id="restart-button">再玩一次</button>
            <button class="end-button" id="exit-button">離開遊戲</button>
        </div>
    </div>
    
    <!-- 音效元素 -->
    <audio id="endSound">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        // 創建裝飾星星
        function createStars() {
            const container = document.body;
            const starCount = 50;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'pixel-star';
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 2}s`;
                container.appendChild(star);
            }
        }
        
        // 創建慶祝彩花
        function createConfetti() {
            const container = document.body;
            const colors = ['#e94560', '#f9f9f9', '#4cc9f0', '#4361ee', '#3a0ca3'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.top = `${Math.random() * -20}%`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = `${3 + Math.random() * 2}s`;
                confetti.style.animationDelay = `${Math.random() * 0.5}s`;
                container.appendChild(confetti);
                
                // 移除彩花元素以優化性能
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }
        
        // 再玩一次函數 - 導航到menu.html
        function restartGame() {
            // 播放音效
            const endSound = document.getElementById('endSound');
            endSound.currentTime = 0;
            endSound.play().catch(e => console.log('Sound play prevented:', e));
            
            // 導航到開始菜單
            window.location.href = 'menu.html';
        }
        
        // 離開遊戲函數 - 關閉窗口
        function exitGame() {
            // 播放音效
            const endSound = document.getElementById('endSound');
            endSound.currentTime = 0;
            endSound.play().catch(e => console.log('Sound play prevented:', e));
            
            // 延遲一點時間讓音效播放
            setTimeout(() => {
                // 嘗試關閉窗口
                window.close();
                
                // 如果window.close()不起作用（在某些瀏覽器中），顯示感謝訊息
                alert('感謝您的遊玩！');
            }, 500);
        }
        
        // 設置按鈕事件
        document.getElementById('restart-button').addEventListener('click', restartGame);
        document.getElementById('exit-button').addEventListener('click', exitGame);
        
        // 初始化裝飾元素
        window.onload = function() {
            createStars();
            createConfetti();
        };
    </script>
</body>
</html>
