<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDGs RPG - 和平守護者射擊關</title>
    <style>
        /* 優化的像素風基礎樣式 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Press Start 2P', cursive;
            background-color: #0a0a1a;
            color: #fff;
            overflow: hidden;
            image-rendering: pixelated;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        @font-face {
            font-family: 'Press Start 2P';
            src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        }
        
        /* 優化的標題欄 */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: #16213e;
            border-bottom: 4px solid #0f3460;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 400;
            background-image: 
                linear-gradient(transparent 95%, rgba(233, 69, 96, 0.1) 95%),
                linear-gradient(90deg, transparent 95%, rgba(233, 69, 96, 0.1) 95%);
            background-size: 20px 20px;
            width: 800px;
        }
        
        .game-title {
            font-size: 16px;
            color: #e94560;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 1px;
        }
        
        .score {
            font-size: 16px;
            color: #f9f9f9;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            align-items: center;
        }
        
        .score-icon {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            background-color: #e94560;
            border: 2px solid #f9f9f9;
            box-shadow: 2px 2px 0 #000;
        }
        
        /* 優化的遊戲容器 */
        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            overflow: hidden;
            border: 8px solid #0f3460;
            box-shadow: 
                0 0 0 8px #533483,
                0 8px 0 8px #0f0f2d,
                0 0 30px rgba(233, 69, 96, 0.3);
            background-color: #0f0f2d;
            z-index: 1;
        }
        
        /* 優化的像素風場景元素 */
        .pixel-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-color: #0f0f2d;
            background-image: 
                linear-gradient(transparent 95%, rgba(233, 69, 96, 0.1) 95%),
                linear-gradient(90deg, transparent 95%, rgba(233, 69, 96, 0.1) 95%),
                linear-gradient(#0f0f2d 1px, transparent 1px),
                linear-gradient(90deg, #0f0f2d 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px, 20px 20px, 20px 20px;
        }
        
        .pixel-object {
            image-rendering: pixelated;
            position: absolute;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5));
        }
        
        /* 射擊目標樣式 */
        .target {
            position: absolute;
            width: 80px;
            height: 40px;
            background-color: #533483;
            border: 3px solid #0f3460;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 10px;
            line-height: 1.2;
            padding: 5px;
            cursor: crosshair;
            z-index: 10;
            transition: transform 0.1s;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
        }
        
        .target:hover {
            transform: scale(1.05);
        }
        
        .target.correct {
            background-color: #4CAF50;
            border-color: #388E3C;
        }
        
        .target.incorrect {
            background-color: #e94560;
            border-color: #D32F2F;
        }
        
        /* 準星 */
        .crosshair {
            position: absolute;
            width: 20px;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23e94560"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
        }
        
        /* 射擊效果 */
        .bullet-hole {
            position: absolute;
            width: 16px;
            height: 16px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23e94560"><circle cx="12" cy="12" r="8"/></svg>');
            background-repeat: no-repeat;
            z-index: 5;
            pointer-events: none;
        }
        
        /* 結果畫面 */
        .result-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(22, 33, 62, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            display: none;
        }
        
        .result-message {
            font-size: 24px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.5;
            color: #e94560;
            text-shadow: 3px 3px 0 #000;
            padding: 0 20px;
        }
        
        .next-button, .retry-button {
            padding: 15px 30px;
            font-size: 16px;
            background-color: #e94560;
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 3px solid #fff;
            box-shadow: 5px 5px 0 #000;
            transition: all 0.2s ease;
        }
        
        .next-button:hover, .retry-button:hover {
            background-color: #ff6b81;
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 #000;
        }
        
        /* 成就通知 */
        .achievement-notice {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #533483;
            padding: 10px 15px;
            border: 3px solid #e94560;
            z-index: 200;
            display: none;
            box-shadow: 4px 4px 0 #000;
            animation: slideDown 0.5s forwards;
        }
        
        @keyframes slideDown {
            0% { top: -100px; opacity: 0; }
            100% { top: 20px; opacity: 1; }
        }
        
        .achievement-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            background-color: #e94560;
            border: 2px solid #f9f9f9;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        /* 閃光效果 */
        .flash {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        /* 粒子效果 */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #e94560;
            z-index: 15;
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="game-title">SDG16 和平守護者射擊關</div>
        <div class="score">
            <span class="score-icon"></span>
            <span id="score">0</span>/700
        </div>
    </div>
    
    <div id="game-container">
        <!-- 像素背景 -->
        <div class="pixel-bg"></div>
        
        <!-- 準星 -->
        <div class="crosshair" id="crosshair"></div>
        
        <!-- 射擊目標將由JavaScript動態生成 -->
        
        <!-- 結果畫面 -->
        <div class="result-screen" id="result-screen">
            <div class="result-message" id="result-message"></div>
            <button class="next-button" id="next-button" style="display: none;">下一關</button>
            <button class="retry-button" id="retry-button" style="display: none;">重新挑戰</button>
        </div>
        
        <!-- 閃光效果 -->
        <div class="flash" id="flash"></div>
    </div>
    
    <script>
        // 遊戲狀態
        const gameState = {
            score: 0,
            maxScore: 700,
            targetsHit: 0,
            totalTargets: 0,
            gameActive: false,
            targets: [],
            achievements: {
                sharpshooter: false,
                justiceDefender: false,
                perfectAim: false
            }
        };
        
        // 射擊目標數據
        const targetData = [
            // 正確選項 (符合SDG16)
            { text: "公平司法", correct: true },
            { text: "和平社會", correct: true },
            { text: "有效制度", correct: true },
            { text: "反貪腐", correct: true },
            { text: "包容決策", correct: true },
            { text: "法律面前人人平等", correct: true },
            { text: "保護基本自由", correct: true },
            { text: "減少暴力", correct: true },
            { text: "透明治理", correct: true },
            { text: "問責制度", correct: true },
            
            // 錯誤選項
            { text: "暴力解決", correct: false },
            { text: "歧視政策", correct: false },
            { text: "貪污腐敗", correct: false },
            { text: "司法不公", correct: false },
            { text: "壓制言論", correct: false },
            { text: "特權階級", correct: false },
            { text: "賄賂官員", correct: false },
            { text: "種族隔離", correct: false },
            { text: "獨裁統治", correct: false },
            { text: "無視人權", correct: false }
        ];
        
        // 初始化遊戲
        function initGame() {
            // 設置準星跟隨鼠標
            document.addEventListener('mousemove', function(e) {
                const crosshair = document.getElementById('crosshair');
                crosshair.style.left = e.clientX + 'px';
                crosshair.style.top = e.clientY + 'px';
            });
            
            // 設置點擊射擊事件
            document.getElementById('game-container').addEventListener('click', function(e) {
                if (!gameState.gameActive) return;
                
                // 創建射擊效果
                createBulletHole(e.clientX, e.clientY);
                
                // 檢查是否擊中目標
                checkHit(e.clientX, e.clientY);
            });
            
            // 設置結果畫面按鈕
            document.getElementById('retry-button').addEventListener('click', function() {
                window.location.reload();
            });
            
            document.getElementById('next-button').addEventListener('click', function() {
                window.location.href = 'level3.html';
            });
            
            // 開始遊戲
            startGame();
        }
        
        function startGame() {
            gameState.gameActive = true;
            gameState.score = 0;
            gameState.targetsHit = 0;
            gameState.totalTargets = 0;
            updateScore();
            
            // 清除現有目標
            clearTargets();
            
            // 開始生成目標
            generateTargets();
        }
        
        function generateTargets() {
            // 每1-2秒生成一個新目標
            const interval = setInterval(() => {
                if (!gameState.gameActive) {
                    clearInterval(interval);
                    return;
                }
                
                // 檢查是否已達到最大分數
                if (gameState.score >= gameState.maxScore) {
                    clearInterval(interval);
                    endGame(true);
                    return;
                }
                
                // 隨機選擇目標類型 (60%正確, 40%錯誤)
                const isCorrect = Math.random() < 0.6;
                const filteredTargets = targetData.filter(t => t.correct === isCorrect);
                const randomTarget = filteredTargets[Math.floor(Math.random() * filteredTargets.length)];
                
                // 創建目標元素
                createTarget(randomTarget.text, randomTarget.correct);
                
            }, 1000 + Math.random() * 1000);
        }
        
        function createTarget(text, isCorrect) {
            const container = document.getElementById('game-container');
            const target = document.createElement('div');
            target.className = `target ${isCorrect ? 'correct' : 'incorrect'}`;
            target.textContent = text;
            
            // 隨機位置 (確保在遊戲容器內)
            const x = 100 + Math.random() * 600;
            const y = 100 + Math.random() * 300;
            
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            
            // 設置目標ID和數據
            const targetId = 'target-' + Date.now();
            target.id = targetId;
            
            // 添加到DOM和遊戲狀態
            container.appendChild(target);
            gameState.targets.push({
                id: targetId,
                element: target,
                correct: isCorrect,
                x: x,
                y: y,
                width: 80,
                height: 40
            });
            
            gameState.totalTargets++;
            
            // 目標在3秒後消失
            setTimeout(() => {
                removeTarget(targetId);
            }, 3000);
        }
        
        function removeTarget(id) {
            if (!gameState.gameActive) return;
            
            const targetIndex = gameState.targets.findIndex(t => t.id === id);
            if (targetIndex === -1) return;
            
            // 從DOM移除
            const target = gameState.targets[targetIndex];
            if (target.element.parentNode) {
                target.element.parentNode.removeChild(target.element);
            }
            
            // 從遊戲狀態移除
            gameState.targets.splice(targetIndex, 1);
        }
        
        function clearTargets() {
            // 清除所有目標
            gameState.targets.forEach(target => {
                if (target.element.parentNode) {
                    target.element.parentNode.removeChild(target.element);
                }
            });
            
            gameState.targets = [];
        }
        
        function createBulletHole(x, y) {
            const container = document.getElementById('game-container');
            const bulletHole = document.createElement('div');
            bulletHole.className = 'bullet-hole';
            
            // 調整位置以考慮遊戲容器的偏移
            const rect = container.getBoundingClientRect();
            const adjustedX = x - rect.left;
            const adjustedY = y - rect.top;
            
            bulletHole.style.left = adjustedX + 'px';
            bulletHole.style.top = adjustedY + 'px';
            
            container.appendChild(bulletHole);
            
            // 1秒後移除
            setTimeout(() => {
                if (bulletHole.parentNode) {
                    bulletHole.parentNode.removeChild(bulletHole);
                }
            }, 1000);
        }
        
        function checkHit(x, y) {
            if (!gameState.gameActive) return;
            
            // 調整位置以考慮遊戲容器的偏移
            const container = document.getElementById('game-container');
            const rect = container.getBoundingClientRect();
            const adjustedX = x - rect.left;
            const adjustedY = y - rect.top;
            
            // 檢查是否擊中任何目標
            for (let i = 0; i < gameState.targets.length; i++) {
                const target = gameState.targets[i];
                
                if (adjustedX >= target.x && adjustedX <= target.x + target.width &&
                    adjustedY >= target.y && adjustedY <= target.y + target.height) {
                    
                    // 擊中目標
                    handleTargetHit(target);
                    return;
                }
            }
            
            // 未擊中任何目標
            playMissSound();
        }
        
        function handleTargetHit(target) {
            // 閃光效果
            flashScreen(target.correct ? '#4CAF50' : '#e94560');
            
            // 更新分數
            if (target.correct) {
                gameState.score = Math.min(gameState.score + 50, gameState.maxScore);
                gameState.targetsHit++;
                
                // 檢查成就
                if (gameState.targetsHit >= 10 && !gameState.achievements.sharpshooter) {
                    unlockAchievement("sharpshooter", "神射手: 擊中10個正確目標!");
                }
                
                if (gameState.score >= 500 && !gameState.achievements.justiceDefender) {
                    unlockAchievement("justiceDefender", "正義守護者: 獲得500分!");
                }
            } else {
                gameState.score = Math.max(gameState.score - 25, 0);
            }
            
            updateScore();
            
            // 從遊戲中移除目標
            removeTarget(target.id);
            
            // 播放音效
            playHitSound(target.correct);
            
            // 檢查是否達到最高分
            if (gameState.score >= gameState.maxScore) {
                endGame(true);
            }
        }
        
        function endGame(success) {
            gameState.gameActive = false;
            clearTargets();
            
            const resultScreen = document.getElementById('result-screen');
            const resultMessage = document.getElementById('result-message');
            const nextButton = document.getElementById('next-button');
            const retryButton = document.getElementById('retry-button');
            
            resultScreen.style.display = 'flex';
            
            if (success) {
                resultMessage.textContent = `恭喜！你獲得了 ${gameState.score} 分，成功完成射擊挑戰！`;
                nextButton.style.display = 'block';
                
                if (gameState.score === gameState.maxScore && !gameState.achievements.perfectAim) {
                    unlockAchievement("perfectAim", "完美射擊: 獲得滿分700分!");
                }
            } else {
                resultMessage.textContent = `你獲得了 ${gameState.score} 分，未達到通關標準，請重新挑戰！`;
                retryButton.style.display = 'block';
            }
        }
        
        function updateScore() {
            document.getElementById('score').textContent = gameState.score;
        }
        
        function flashScreen(color) {
            const flash = document.getElementById('flash');
            flash.style.backgroundColor = color;
            flash.style.opacity = '0.7';
            
            setTimeout(() => {
                flash.style.opacity = '0';
            }, 100);
        }
        
        function playHitSound(isCorrect) {
            // 實際遊戲中可以添加音效
            console.log(isCorrect ? '正確命中音效' : '錯誤命中音效');
        }
        
        function playMissSound() {
            // 實際遊戲中可以添加音效
            console.log('未命中音效');
        }
        
        function unlockAchievement(id, text) {
            gameState.achievements[id] = true;
            
            const notice = document.getElementById('achievement-notice');
            document.getElementById('achievement-text').textContent = text;
            notice.style.display = 'block';
            
            setTimeout(() => {
                notice.style.display = 'none';
            }, 3000);
        }
        
        // 啟動遊戲
        window.onload = initGame;
    </script>
</body>
</html>
