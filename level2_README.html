<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDGs RPG - 和平守護者射擊關</title>
    <style>
        /* 全局樣式保持不變 */
        /* ... */
        
        /* 簡潔說明畫面樣式 */
        .instruction-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(22, 33, 62, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .instruction-title {
            font-size: 24px;
            color: #e94560;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #000;
            padding: 10px 20px;
            border-bottom: 3px solid #e94560;
        }
        
        .instruction-content {
            max-width: 600px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background-color: rgba(15, 52, 96, 0.7);
        }
        
        .target-example {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
        }
        
        .target-example div {
            text-align: center;
        }
        
        .correct-target {
            color: #4CAF50;
            font-weight: bold;
        }
        
        .incorrect-target {
            color: #FF5252;
            font-weight: bold;
        }
        
        .continue-button {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #e94560;
            color: white;
            border: 3px solid #fff;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 4px 4px 0 #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="game-title">SDG16 和平守護者射擊關</div>
        <div class="score">
            <span class="score-icon"></span>
            <span id="score">0</span>/700
        </div>
    </div>
    
    <div id="game-container">
        <!-- 簡潔說明畫面 -->
        <div class="instruction-screen" id="instruction-screen">
            <div class="instruction-title">第二關：和平守護者射擊</div>
            <div class="instruction-content">
                <p>用滑鼠瞄準並射擊<span class="correct-target">正確目標</span></p>
                
                <div class="target-example">
                    <div>
                        <div class="target correct" style="position:relative;left:0;top:0;margin:10px auto;">公平司法</div>
                        <p class="correct-target">+50分</p>
                    </div>
                    <div>
                        <div class="target incorrect" style="position:relative;left:0;top:0;margin:10px auto;">暴力解決</div>
                        <p class="incorrect-target">-25分</p>
                    </div>
                </div>
                
                <p>達到<span style="color:#FFD700;font-weight:bold;">700分</span>即可通關</p>
                <p style="margin-top:10px;font-size:12px;color:#aaa;">目標會在3秒後消失</p>
            </div>
            <button class="continue-button" id="continue-button">開始射擊</button>
        </div>
    </div>

    <script>
        function startGame() {
            const instructionScreen = document.getElementById('instruction-screen');
            const continueButton = document.getElementById('continue-button');
            
            continueButton.addEventListener('click', function() {
                window.location.href = 'level2.html';
            });
        }
        
        window.onload = startGame;
    </script>
</body>
</html>
