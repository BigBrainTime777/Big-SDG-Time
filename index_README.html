<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDGs RPG - 和平、正義及健全制度</title>
    <style>
        /* 全局樣式保持不變 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Press Start 2P', cursive;
            background-color: #0a0a1a;
            color: #fff;
            overflow: hidden;
            image-rendering: pixelated;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* 新增的簡潔說明畫面樣式 */
        .instruction-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(22, 33, 62, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .instruction-title {
            font-size: 24px;
            color: #e94560;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #000;
            padding: 10px 20px;
            border-bottom: 3px solid #e94560;
        }
        
        .instruction-content {
            max-width: 600px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background-color: rgba(15, 52, 96, 0.7);
        }
        
        .instruction-key {
            color: #4CAF50;
            font-weight: bold;
        }
        
        .continue-button {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #e94560;
            color: white;
            border: 3px solid #fff;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 4px 4px 0 #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="game-title">SDGs 和平、正義及健全制度</div>
        <div class="score">答對題數: <span id="score">0</span>/7</div>
    </div>
    
    <div id="game-container">
        <!-- 簡潔說明畫面 -->
        <div class="instruction-screen" id="instruction-screen">
            <div class="instruction-title">第一關：和平與正義挑戰</div>
            <div class="instruction-content">
                <p><span class="instruction-key">↑↓←→</span> 移動角色接近敵人</p>
                <p><span class="instruction-key">點擊敵人</span> 回答SDG16相關問題</p>
                <p>答對<span class="instruction-key">5題</span>即可通關</p>
                <p style="margin-top:15px;color:#FFD700;">目標：了解和平社會與健全制度的重要性</p>
            </div>
            <button class="continue-button" id="continue-button">開始挑戰</button>
        </div>
    </div>

    <script>
        function startGame() {
            const instructionScreen = document.getElementById('instruction-screen');
            const continueButton = document.getElementById('continue-button');
            
            continueButton.addEventListener('click', function() {
                window.location.href = 'index.html';
            });
        }
        
        window.onload = startGame;
    </script>
</body>
</html>
